<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Chatbot IA</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    #chat-box { width: 400px; margin: 50px auto; background: #fff; border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .msg { margin: 5px 0; }
    .user { color: blue; }
    .bot { color: green; }
    #chat-form { display: flex; margin-top: 10px; }
    #msg { flex: 1; padding: 5px; }
    button { padding: 5px 10px; }
    .floating-button {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #333;
        color: white;
        padding: 12px 20px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9em;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        transition: background-color 0.3s ease;
        z-index: 1000;
    }
    .floating-button:hover {
        background-color: #555;
    }
  </style>
</head>
<body>
  <a href="../index.html" class="floating-button">Voltar</a>

  <div id="chat-box"></div>

  <form id="chat-form">
    <input type="text" id="msg" placeholder="Digite sua mensagem..." required>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const form = document.getElementById("chat-form");
    const chatBox = document.getElementById("chat-box");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg").value;
      chatBox.innerHTML += `<div class="msg user"><b>Você:</b> ${msg}</div>`;
      document.getElementById("msg").value = "";

      try {
        const res = await fetch("chat.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });

        if (!res.ok) throw new Error("Erro no servidor.");

        const data = await res.json();
        chatBox.innerHTML += `<div class="msg bot"><b>Bot:</b> ${data.reply}</div>`;
      } catch (error) {
        chatBox.innerHTML += `<div class="msg bot" style="color:red;"><b>Erro:</b> ${error.message}</div>`;
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    });
  </script>
</body>
</html>
