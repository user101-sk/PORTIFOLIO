<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Mágico</title>
    <!-- Liga o CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="floating-button">Voltar</a>


    <!-- O elemento mutante que viaja pela tela -->
    <a id="elemento-mutante" class="estado-quadrado" href="#" target="_blank">
        <span id="texto-botao">Acessar Projeto 7</span>
    </a>

    <!-- Secção 1 -->
    <section class="seccao fundo-escuro">
        <div class="caixa-texto">
            <h1>Fase 1: O Início</h1>
            <p>Dê um pequeno scroll para baixo para ser "puxado" para a próxima secção.</p>
        </div>
    </section>

    <!-- Secção 2 -->
    <section class="seccao fundo-claro">
        <div class="caixa-texto">
            <h1>Fase 2: O Meio</h1>
            <p>O elemento viajou para o canto e não atrapalha a leitura!</p>
        </div>
    </section>

    <!-- Secção 3 -->
    <section class="seccao fundo-escuro">
        <div class="caixa-texto">
            <h1>Fase 3: O Fim</h1>
            <p>Agora ele é um botão gigante. Se der muito zoom, o vidro protege este texto!</p>
        </div>
    </section>

    <!-- Liga o JavaScript -->
    <script src="script.js"></script>
</body>
</html>
